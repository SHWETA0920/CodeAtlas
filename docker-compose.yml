version: '3.9'

services:
  # ── PostgreSQL + pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devbrain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devbrain
      POSTGRES_PASSWORD: devbrain
      POSTGRES_DB: devbrain
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Flask backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devbrain_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - VECTOR_STORE=${VECTOR_STORE:-pgvector}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=devbrain
      - PG_PASSWORD=devbrain
      - PG_DB=devbrain
      - FLASK_DEBUG=false
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/faiss_indexes:/app/faiss_indexes
    ports:
      - "5000:5000"

  # ── Next.js frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devbrain_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:5000
    ports:
      - "3000:3000"

volumes:
  pgdata:
